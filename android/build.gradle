buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
        classpath("com.google.gms:google-services:4.4.2")
    }
}

apply plugin: "com.facebook.react.rootproject"

allprojects {
    repositories {
        maven {
            // AsyncStorage v3 ships its Android artifact in a local Maven repo.
            url("$rootDir/../node_modules/@react-native-async-storage/async-storage/android/local_repo")
        }
    }
    configurations.all {
        // Some third-party libs still pull legacy support libraries; exclude them in favor of AndroidX.
        exclude group: "com.android.support"
    }
}
